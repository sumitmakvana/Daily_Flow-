name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Fast lane: lint + unit/coverage. Fails fast on any regression.
  # ──────────────────────────────────────────────────────────────────
  unit:
    name: Lint + Unit (coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Unit tests with coverage (95% threshold)
        run: bunx vitest run --coverage --reporter=default --reporter=junit --outputFile=./reports/vitest-junit.xml
        env:
          CI: "true"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit
          path: reports/vitest-junit.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # SQL integration tests against the test Lovable Cloud DB.
  # Requires repo secret PG_TEST_URL (Postgres connection string with
  # creds for the test project). Skipped on forks (no secret access).
  # ──────────────────────────────────────────────────────────────────
  sql-integration:
    name: SQL functions vs test DB
    runs-on: ubuntu-latest
    needs: unit
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install psql client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client

      - name: Run SQL integration suite
        run: bunx vitest run tests/integration
        env:
          # Parse PG_TEST_URL=postgres://user:pass@host:5432/db into PG* env
          # so the existing tests/integration psql calls (which rely on
          # default PG* vars) just work.
          PG_TEST_URL: ${{ secrets.PG_TEST_URL }}
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGSSLMODE: require

  # ──────────────────────────────────────────────────────────────────
  # Playwright E2E against the test deployment. Critical journeys:
  # login → today → blockers → intelligence → planning → exports.
  # Sharded across 2 runners for fast feedback (<5 min total).
  # ──────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (shard ${{ matrix.shard }}/2) — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers + system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps ${{ matrix.project == 'mobile' && 'chromium' || matrix.project }}

      - name: Install system deps only (cached browser)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps ${{ matrix.project == 'mobile' && 'chromium' || matrix.project }}

      - name: Run Playwright (shard ${{ matrix.shard }}/2)
        run: bunx playwright test --project=${{ matrix.project }} --shard=${{ matrix.shard }}/2 --reporter=html,list,github
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload Playwright HTML report (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}-shard${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload traces, screenshots & videos (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.project }}-shard${{ matrix.shard }}
          path: test-results/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # Aggregate gate — single required check for branch protection.
  # ──────────────────────────────────────────────────────────────────
  ci-passed:
    name: CI passed
    if: always()
    needs: [unit, sql-integration, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any upstream job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "All required checks passed"
