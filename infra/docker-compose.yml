name: daily-flow

services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=${POSTGRES_DB}
    volumes:
      - /data/docker_volumes/daily-flow/pgdata:/var/lib/postgresql/data
      - ./sql:/sql:ro
      - ./sql/00-auth-stub.sql:/docker-entrypoint-initdb.d/00-auth-stub.sql:ro
    ports:
      - "7055:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: '{"keys":[{"kid":"8tesB6fZU3Dts0gx5pOhNIGLXd9_wSqidawrDeM6-uI","kty":"RSA","alg":"RSA-OAEP","use":"enc","n":"pHRMkZFuqlfKpnFaBsb7qcugHVJs_TAek0fO0Brt8zEgbCRXGQRe3adXTfWKBuIFAa3W_TrkL8eiE8uMIldQywFZhVZZx5Que-OaEK_60zpIR3KwPT21MvV56BX8uboh7cLnknJ_AK_1MWxt0QcD_yoMZRfTRnprMsxV77JlmSl_nvK6do9x8XWUwxyW7QF7umZ3xqXbABFXnx8BFSa61T3YcEzs4ugnc5llIYSkqWtEiMNWXdkhEKYy3p2KZ1KfJq78413aa_zqpHoUIz8kILPsfR2h5tAQ9-UAw2_2sVc8BqUqAAfE7sBeKHoUZf0HixJxU7rJ4OPJ0JuOD3yc1w","e":"AQAB","x5c":[""],"x5t":"nJ40Fw7CEGJpx5MAs0URpw8B2uk","x5t#S256":"Wvhls2X1Q1FGXTN8vASg4eVPzMM23wlXp4NDmK-3JNA"},{"kid":"lk9I-AqO15KxgHC9X-y5-bQC4qXB8tLylyV5GjMaAAE","kty":"RSA","alg":"RS256","use":"sig","n":"oO1CNcD9n8gPv9iHSzp8bia_PKXlb7a0y6US3eT4nUUc9w-9CdMds6rXMpE6v5t7URRmFVBCtliU6azU_mOYHlBy2QHHf1y6sD0xVNxf3O-N9ShlABl2tAw0ZGHlcNpbDH7r9zKQE_ghafdaY1255TAvXHkGVlcL0mw_fXxZGNTBvZJTSFgTrmain944EH5Uu4h5_9kk7u-ocavx9Ew_D4rTKa2xUvrT0SaT1Bkkes_eH7R5xkVSEAOLftkuk86AIR4Elg9bs0GGPqVoG42n8MNLI7Xdmb-Jlfq0iO-hztbWVfwWcqM8RqH-BPExlW95q8pvixR9qdEHJg_FBq0NqQ","e":"AQAB","x5c":[""],"x5t":"ipBJ5L39ws66OK_SAsvMDX6s9BA","x5t#S256":"IXyVudH11clVz8veZy5YOtwlAq3S20bwiFfWMwnpp70"},{"kty":"oct","kid":"service_role_key","k":"c3VwZXItc2VjcmV0LWp3dC10b2tlbi13aXRoLWF0LWxlYXN0LTMyLWNoYXJhY3RlcnMtbG9uZw","alg":"HS256"}]}'
      PGRST_DB_USE_LEGACY_GUCS: "true"
    expose:
      - "3000"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYAKLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /
      JAVA_OPTS_APPEND: "-Dkeycloak.migration.action=import -Dkeycloak.migration.provider=singleFile -Dkeycloak.migration.file=/opt/keycloak/data/import/realm.json -Dkeycloak.migration.strategy=IGNORE_EXISTING"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 120s
    depends_on:
      postgres: { condition: service_healthy }


  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:7051}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    ports:
      - "7050:8080"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
      - BACKEND_MODE=self
      - PORT=8080
      - CRON_SECRET=${CRON_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "7051:7051"
      - "7052:7052"
      - "7053:7053"
      - "7054:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      FILES_DOMAIN: ${FILES_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/docker_volumes/daily-flow/caddy_data:/data
      - /data/docker_volumes/daily-flow/caddy_config:/config
