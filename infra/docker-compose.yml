name: daily-flow

services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=${POSTGRES_DB}
    volumes:
      - /data/docker_volumes/daily-flow/pgdata:/var/lib/postgresql/data
      - ./sql:/sql:ro
      - ./sql/00-auth-stub.sql:/docker-entrypoint-initdb.d/00-auth-stub.sql:ro
    ports:
      - "7055:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: '{"keys":[{"kid":"6nBwviV-cguNT9EklwCSh9zkZRK8Qcq6sxvEYmMiPbY","kty":"RSA","alg":"RS256","use":"sig","n":"qYPxnwuwBhetE6Qp0rFscry0CNEPtRDetXzQNVPb-HNn5546Mdyw_B9F09lLs7ad7CHC3WPDs8crwqbDm1G0izUhV_Ad6Xzy3ns66oK_NLO3hkcXRwRdsnJkh-dy1YMY47pKlBwoudu_cCYn25OPAcp81GIQe3hY7PenjN-olFXdHVkqTKzUEKdcGvoIvSadbJz3L0POVhtjxmgxYMfWjdrafIU6TVa37XLX-9pdoNUDhvUHzRZ23LVbroCEy0R0rlydYj0-6rb-mC4r6ZHR7LD43hYrJlENRvSDOG3TD9fXzvqz0ZpPNWSkH_fLMkrbIp0-zImguuOHLW4ARJJKzw","e":"AQAB","x5c":[""],"x5t":"3m9BZ6tXusU_cG7YTu5P8MZ0VoQ","x5t#S256":"PLoZ9zugkJ0IkMJMCj9rClzGfA5QYFZjtSaAT6F_hms"},{"kid":"8nZlSUY7j7Cwh2T0QpxpYme3w9AcCkCKs_AZt_LEXfQ","kty":"RSA","alg":"RSA-OAEP","use":"enc","n":"yJ3Nf0vqRMKo012pYjQXZp9tq2qJ1z0UgTOS2AM9FgGxVrM5D22eSFykPl63yrOt9cptpHXRVJDyd6pu5xzj1hBp01YkXJkLV7J4fQCpP349fh96PDcrulPMRDe_NtodnZoPtMnjdI8mJJWG5hLE_JGwwmQ1hvnXlhaI5S_I2PnJcZlsqt_ZICIJ_EaA3O7CWThRJfHOJR3814j_oaigwBvqKi87BSgT98g9wO1Gvi4-AEE5VYsxyAM4RSjdvl3T45U7rsfTyLy6yJkbP63S1pskygQ90X0ev1CA63R_pbIUNt2UjLdWldq0AmXGBaNqLxV8ldKabzyN-8HJV4vHEQ","e":"AQAB","x5c":[""],"x5t":"vIdTaLKiKr4SS0SSxQqwZn4POWw","x5t#S256":"OYvSSvbLygXODGBC73c2_gvzDv7DtXJTb8SbH62NsoI"}]}'
      PGRST_DB_USE_LEGACY_GUCS: "false"
    expose:
      - "3000"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYAKLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /
      JAVA_OPTS_APPEND: "-Dkeycloak.migration.action=import -Dkeycloak.migration.provider=singleFile -Dkeycloak.migration.file=/opt/keycloak/data/import/realm.json -Dkeycloak.migration.strategy=OVERWRITE_EXISTING"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres: { condition: service_healthy }

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /data/docker_volumes/daily-flow/minio:/data
    expose:
      - "9000"
      - "9001"

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET};
      /usr/bin/mc anonymous set none local/${MINIO_BUCKET};
      exit 0;
      "

  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:7051}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    ports:
      - "7050:8080"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SUPABASE_URL=http://postgrest:3000
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
      - BACKEND_MODE=self
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "7051:7051"
      - "7052:7052"
      - "7053:7053"
      - "7054:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      FILES_DOMAIN: ${FILES_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/docker_volumes/daily-flow/caddy_data:/data
      - /data/docker_volumes/daily-flow/caddy_config:/config
