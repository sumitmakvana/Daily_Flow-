name: lovable-self-hosted

services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_ROLE_CLAIM_KEY: ".role"
      PGRST_JWT_SECRET: '{"keys":[{"kid":"nSFBn7bcYKGix6gpMTZp21ujFQl3Uu6uu-btwNT9FtI","kty":"RSA","alg":"RSA-OAEP","use":"enc","n":"rV-Mh_3kUMJNHrgFGlDlH_M5Jp3dTrmkURZ7CNmhrIRIrY2Ccjufb6Sljh8pUBIjba4i9mHFbsAgazzoIPLutSDcMCi9cGzOjiRmh53XxY2pj3tVCqnhgXzb7lsmG6ol9pztC0eofMNyfI0-51YQMowhE29WdTdMMzv3FFhTa3OIz3cpcdpPhjbS2i0UFcim-iFjQn0DCk1M-Ke-J-I2yxqa30wrVWcnYGT1NZA8Ce_C4NCjKfw7NdS5abEbAHt4afSKE9-btXy7FrHreNUfL2U5yrAsZEX4VO_KJK1RcRUW_7M2WAtihM00wZiGYEBoiBqn0oo0U885Awl4lTOVuQ","e":"AQAB","x5c":[""],"x5t":"36FwzD9X9LErcLf0M3Ttrfo0Tt0","x5t#S256":"rgLRZAnq7M7ya1bGXVf1n9GX8rjAhgIB2HDJj4TKztE"},{"kid":"E_6hiIlIsOmmcIXQaWwCnZCSSiUV14JDbPvMQRDmZw0","kty":"RSA","alg":"RS256","use":"sig","n":"uh4BGIdcx_BENlof1C3JV66B54vwdZxrOucAQfS2p-XvrNojq-SG6jlXZ7L9Nl3GibKvPM3wrGma0gUkX6sp5OdPdtCiIIiR1SV5X-yOUjngTHkMqv87MvfITM9GkjLUbLDPyRU4L7f6PhfsuGjpUjU86llqwoI53MW6KpO0qwRn1eR1cSsthiI3Bo3qwY3OwLKvWmTtDYhUZLoOz7ZRAiPBAQcqcQYuawc9rJ22T2J7cB-O1SHOueieUh45xG2npu7WtfxWgc7iCt7UKcazdw-m2utNzpbwrFrmHO3DkRWkHQD8fwBtme6i8XXcexl-oSHR3mbZVH8097aqDSrZFw","e":"AQAB","x5c":[""],"x5t":"pSls5nLiiR0j_ufweTInnWJFTvE","x5t#S256":"wtMRlUEGMsqbCFfN7kpGYjiCY9Q-pRGMLDCwRCAZ7UQ"}]}'
      PGRST_DB_USE_LEGACY_GUCS: "false"
    expose: ["3000"]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /
      JAVA_OPTS_APPEND: "-Dkeycloak.import.strategy=OVERWRITE_EXISTING"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    expose: ["8080"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres: { condition: service_healthy }

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio:/data
    expose: ["9000", "9001"]

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET};
      /usr/bin/mc anonymous set none local/${MINIO_BUCKET};
      exit 0;
      "

  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:7051}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    ports:
      - "7050:8080"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SUPABASE_URL=http://postgrest:3000
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
      - BACKEND_MODE=self
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "7051:7051"
      - "7052:7052"
      - "7053:7053"
      - "7054:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      FILES_DOMAIN: ${FILES_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  minio:
  caddy_data:
  caddy_config:
